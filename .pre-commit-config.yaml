ci:
  autofix_commit_msg: "🚨 `pre-commit-ci` 修复格式错误"
  autofix_prs: true
  autoupdate_branch: master
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "⬆️ `pre-commit-ci` 自动升级"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
        exclude: ^CCUID/utils/render_assets/vendor/

  # 前端资源 (css / js / html / markdown) 格式化，与 IDE 同版本同配置 (.prettierrc)
  # 注：.j2 模板含 Jinja 占位符，Prettier 推断不出 parser，已在 .prettierignore 排除。
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.7.4
    hooks:
      - id: prettier
        types_or: [css, javascript, markdown, html]
        exclude: ^CCUID/utils/render_assets/vendor/
